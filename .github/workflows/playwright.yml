name: Playwright Tests
on:
  push:
    branches: [ '**' ]
  pull_request:
    # Runs on PRs to any branch
  repository_dispatch:
    types: [frontend-pr-update]
  workflow_dispatch:
    inputs:
      frontend_branch:
        description: 'Frontend branch to test against (if applicable)'
        required: false
        default: 'main'
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - name: Set PR status as pending
      if: github.event_name == 'repository_dispatch' && github.event.client_payload.repository != '' && github.event.client_payload.sha != ''
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.FRONTEND_SYNC_TOKEN }}
        script: |
          await github.rest.repos.createCommitStatus({
            owner: context.payload.client_payload.repository.split('/')[0],
            repo: context.payload.client_payload.repository.split('/')[1],
            sha: context.payload.client_payload.sha,
            state: 'pending',
            context: 'E2E Playwright Tests',
            description: 'Running automation suite...',
            target_url: `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.GITHUB_RUN_ID}`
          });
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        ref: ${{ github.ref }}
    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
      env:
        JIRA_URL: ${{ secrets.JIRA_URL }}
        JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
        JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
        CREATE_JIRA_TICKETS: ${{ secrets.CREATE_JIRA_TICKETS }}
    - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    - name: Set PR status on completion
      if: always() && github.event_name == 'repository_dispatch' && github.event.client_payload.repository != '' && github.event.client_payload.sha != ''
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.FRONTEND_SYNC_TOKEN }}
        script: |
          const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
          const description = state === 'success' ? 'All tests passed!' : 'Tests failed. Check details.';
          await github.rest.repos.createCommitStatus({
            owner: context.payload.client_payload.repository.split('/')[0],
            repo: context.payload.client_payload.repository.split('/')[1],
            sha: context.payload.client_payload.sha,
            state: state,
            context: 'E2E Playwright Tests',
            description: description,
            target_url: `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.GITHUB_RUN_ID}`
          });
